  <!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 나의 습관 형성 플래너 (Ver 8.0)</title>
  
  <style>
    :root {
      --bg-color: #e3f2fd;
      --card-bg: #ffffff;
      --text-main: #333333;
      --text-sub: #666666;
      --primary-color: #1976d2;
      --primary-hover: #1565c0;
      --border-color: #e0e0e0;
      --progress-bg: #bbdefb;
      --progress-fill: linear-gradient(90deg, #42a5f5, #1976d2);
      --level-color: #ff9800;
      --tag-daily: #4caf50;
      --tag-long: #9c27b0;
      --tag-bad: #e53935;
    }

    [data-theme="dark"] {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #ffffff;
      --text-sub: #aaaaaa;
      --primary-color: #90caf9;
      --primary-hover: #64b5f6;
      --border-color: #333333;
      --progress-bg: #333333;
      --progress-fill: linear-gradient(90deg, #90caf9, #42a5f5);
      --level-color: #ffb74d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Malgun Gothic', sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-main);
      padding: 20px;
    }

    .app-container {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 500px;
      position: relative;
    }

    .top-buttons {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .theme-toggle-btn, .stats-toggle-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      border-radius: 5px;
    }
    .stats-toggle-btn:hover { background-color: rgba(0, 0, 0, 0.05); }
    [data-theme="dark"] .stats-toggle-btn:hover { background-color: rgba(255, 255, 255, 0.1); }

    h1 {
      font-size: 24px;
      margin-bottom: 5px;
      text-align: center;
      padding-right: 60px;
    }

    .date-display {
      text-align: center;
      font-size: 15px;
      color: var(--text-sub);
      font-weight: bold;
      margin-bottom: 15px;
    }

    .stats-container {
      display: flex;
      justify-content: space-between;
      background: var(--bg-color);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .level-box { color: var(--level-color); }
    .streak-box { color: #ff5252; }

    .progress-container {
      background: var(--bg-color);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .progress-label {
      font-size: 14px;
      font-weight: bold;
      color: var(--text-sub);
      margin-bottom: 8px;
    }

    .progress-bar-bg {
      background: var(--progress-bg);
      height: 15px;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: var(--progress-fill);
      width: 0%;
      height: 100%;
      transition: width 0.3s ease;
    }

    .input-form {
      background: var(--bg-color);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-row { display: flex; gap: 10px; }

    #habit-input {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--card-bg);
      color: var(--text-main);
    }

    .select-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      font-size: 13px;
    }

    .select-box { display: flex; flex-direction: column; gap: 4px; }

    select, input[type="date"] {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-main);
      width: 100%;
    }

    #deadline-box { display: none; }

    #add-btn {
      padding: 10px 15px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    #add-btn:hover { background-color: var(--primary-hover); }

    /* 분류용 그룹 헤더 스타일 */
    .group-header {
      font-size: 13px;
      font-weight: bold;
      color: var(--text-sub);
      padding: 10px 4px 4px 4px;
      border-bottom: 2px solid var(--border-color);
      margin-top: 15px;
    }

    #habit-list { list-style: none; }

    .habit-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 10px;
      border-bottom: 1px solid var(--border-color);
    }
    .habit-item.failed-status { background-color: rgba(229, 57, 53, 0.1); }

    .habit-content { display: flex; align-items: center; gap: 12px; flex: 1; }
    .habit-content input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }

    .fail-trigger-btn {
      padding: 6px 10px;
      background-color: #ef5350;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .fail-trigger-btn.failed { background-color: #757575; }

    .habit-details { display: flex; flex-direction: column; }
    .tag-container { display: flex; gap: 5px; margin-bottom: 4px; }

    .habit-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      color: white;
      font-weight: bold;
    }
    .tag-daily { background-color: var(--tag-daily); }
    .tag-long { background-color: var(--tag-long); }
    .tag-bad { background-color: var(--tag-bad); }

    .habit-text.completed { text-decoration: line-through; color: var(--text-sub); }
    .habit-text.failed-text { color: #c62828; font-weight: bold; }

    .meta-info-text { font-size: 11px; color: #ff5252; margin-top: 2px; font-weight: bold; display: flex; gap: 8px; }
    .total-fail-count { color: #e53935; }
    .delete-btn { background: none; border: none; color: #ff5252; cursor: pointer; font-weight: bold; margin-left: 10px; }

    /* 📊 팝업 모달 형태로 변경 (움직임 버그 완벽 해결) */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .report-container {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 15px;
      border: 1px solid var(--border-color);
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      position: relative;
    }
    .close-modal-btn {
      position: absolute;
      top: 15px; right: 15px;
      background: none; border: none;
      font-size: 18px; cursor: pointer;
      color: var(--text-sub);
    }
    .report-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }
    .report-grid { display: flex; flex-direction: column; gap: 12px; font-size: 13px; }
    .report-box { background: var(--bg-color); padding: 12px; border-radius: 8px; }
    .report-box-title { font-weight: bold; color: var(--text-sub); margin-bottom: 6px; font-size: 12px; }
    
    .chart-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .chart-day { min-width: 45px; font-weight: bold; }
    .chart-bar-bg { flex: 1; background: rgba(0,0,0,0.1); height: 8px; border-radius: 4px; overflow: hidden; }
    [data-theme="dark"] .chart-bar-bg { background: rgba(255,255,255,0.1); }
    .chart-bar-fill { background: var(--primary-color); height: 100%; width: 0%; }
    .chart-value { font-size: 11px; min-width: 30px; text-align: right; font-weight: bold; }
    .chart-value.fail { color: #e53935; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="top-buttons">
      <button class="stats-toggle-btn" id="stats-toggle" title="통계 리포트 보기">📊</button>
      <button class="theme-toggle-btn" id="theme-toggle">🌙</button>
    </div>

    <h1>🔥 나의 습관 플래너</h1>
    <div class="date-display" id="current-date">2026년 00월 00일 (요일)</div>
    
    <div class="stats-container">
      <div class="level-box">⭐ Lv.<span id="level-display">1</span> (<span id="exp-display">0</span>/100 EXP)</div>
      <div class="streak-box">🔥 <span id="streak-count">0</span>일째</div>
    </div>
    
    <div class="progress-container">
      <div class="progress-label">오늘의 달성률 (일일 루틴 기준): <span id="progress-text">0%</span></div>
      <div class="progress-bar-bg"><div id="progress-bar" class="progress-bar-fill"></div></div>
    </div>

    <div class="input-form">
      <div class="input-row">
        <input type="text" id="habit-input" placeholder="예: 다리 꼬지 않기, 영양제 먹기">
        <button id="add-btn">추가</button>
      </div>
      <div class="select-grid">
        <div class="select-box">
          <label>습관 유형 선택</label>
          <select id="habit-type" onchange="toggleDeadlineInput()">
            <option value="daily">🔄 일반 일일 루틴 (해야 하는 것)</option>
            <option value="longterm">📅 장기 목표 (체크형 + 마감일 지정)</option>
            <option value="badhabit">❌ 나쁜 습관 끊기 (금지형 목표)</option>
          </select>
        </div>
        <div class="select-box" id="deadline-box">
          <label>목표 마감일 선택 (선택 사항)</label>
          <input type="date" id="habit-deadline">
        </div>
      </div>
    </div>

    <ul id="habit-list"></ul>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="report-container">
      <button class="close-modal-btn" id="close-modal">✖</button>
      <div class="report-title">📊 나의 습관 통계 리포트</div>
      <div class="report-grid">
        <div class="report-box">
          <div class="report-box-title">📅 최근 7일 일일 루틴 달성 현황</div>
          <div id="weekly-routine-chart"></div>
        </div>
        <div class="report-box">
          <div class="report-box-title">💥 최근 7일 금지 목표 실패 횟수</div>
          <div id="weekly-fail-chart"></div>
        </div>
        <div class="report-box" style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div class="report-box-title">🏆 이번 달 종합 스코어</div>
            <div style="font-size: 14px; font-weight: bold;">
              루틴 완료: <span id="month-success" style="color:var(--tag-daily);">0</span>회 | 
              금지 위반: <span id="month-fail" style="color:var(--tag-bad);">0</span>회
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const habitInput = document.getElementById('habit-input');
    const habitType = document.getElementById('habit-type');
    const habitDeadline = document.getElementById('habit-deadline');
    const deadlineBox = document.getElementById('deadline-box');
    const addBtn = document.getElementById('add-btn');
    const habitList = document.getElementById('habit-list');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const streakCountDisplay = document.getElementById('streak-count');
    
    const themeToggleBtn = document.getElementById('theme-toggle');
    const statsToggleBtn = document.getElementById('stats-toggle');
    const modalOverlay = document.getElementById('modal-overlay');
    const closeModalBtn = document.getElementById('close-modal');

    const levelDisplay = document.getElementById('level-display');
    const expDisplay = document.getElementById('exp-display');
    const currentDateDisplay = document.getElementById('current-date');

    const weeklyRoutineChart = document.getElementById('weekly-routine-chart');
    const weeklyFailChart = document.getElementById('weekly-fail-chart');
    const monthSuccessDisplay = document.getElementById('month-success');
    const monthFailDisplay = document.getElementById('month-fail');

    let habits = JSON.parse(localStorage.getItem('habits')) || [];
    let streak = parseInt(localStorage.getItem('streak')) || 0;
    let isStreakBonusGiven = JSON.parse(localStorage.getItem('isStreakBonusGiven')) || false;
    let level = parseInt(localStorage.getItem('level')) || 1;
    let exp = parseInt(localStorage.getItem('exp')) || 0;
    let currentTheme = localStorage.getItem('theme') || 'light';
    let lastSavedDate = localStorage.getItem('lastSavedDate') || '';
    
    let historyData = JSON.parse(localStorage.getItem('historyData')) || {}; 
    let monthlyStats = JSON.parse(localStorage.getItem('monthlyStats')) || { success: 0, fail: 0 };

    if (currentTheme === 'dark') { document.body.setAttribute('data-theme', 'dark'); themeToggleBtn.innerText = '☀️'; }
    themeToggleBtn.addEventListener('click', () => {
      if (document.body.getAttribute('data-theme') === 'dark') {
        document.body.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); themeToggleBtn.innerText = '🌙';
      } else {
        document.body.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); themeToggleBtn.innerText = '☀️';
      }
    });

    // 📊 모달 제어 함수
    statsToggleBtn.addEventListener('click', () => {
      modalOverlay.style.display = 'flex';
      renderStatsReport();
    });
    closeModalBtn.addEventListener('click', () => { modalOverlay.style.display = 'none'; });
    modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) modalOverlay.style.display = 'none'; });

    window.toggleDeadlineInput = function() {
      if (habitType.value === 'longterm' || habitType.value === 'badhabit') {
        deadlineBox.style.display = 'flex';
      } else {
        deadlineBox.style.display = 'none';
        habitDeadline.value = '';
      }
    };

    function getTodayString() {
      const today = new Date();
      return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    }

    function initDateDisplay() {
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const today = new Date();
      currentDateDisplay.innerText = `📅 ${today.getFullYear()}년 ${String(today.getMonth() + 1).padStart(2, '0')}월 ${String(today.getDate()).padStart(2, '0')}일 (${days[today.getDay()]}요일)`;
    }

    function getDDayString(deadlineDateStr) {
      if (!deadlineDateStr) return '';
      const today = new Date(getTodayString());
      const target = new Date(deadlineDateStr);
      const diffTime = target - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      if (diffDays > 0) return `⏳ D-${diffDays}`;
      if (diffDays === 0) return `🔥 D-Day`;
      return `🏁 종료됨`;
    }

    function checkDateReset() {
      const todayStr = getTodayString();

      if (lastSavedDate && lastSavedDate !== todayStr) {
        const dailyHabits = habits.filter(h => h.type === 'daily');
        const dailyCompleted = dailyHabits.filter(h => h.completed).length;
        const dailyPercentage = dailyHabits.length === 0 ? 0 : Math.round((dailyCompleted / dailyHabits.length) * 100);

        const badHabits = habits.filter(h => h.type === 'badhabit');
        const failedBadCount = badHabits.filter(h => h.failed === true).length;

        historyData[lastSavedDate] = { routineScore: dailyPercentage, failCount: failedBadCount };
        monthlyStats.success += dailyCompleted;
        monthlyStats.fail += failedBadCount;

        const dailyAllDone = dailyHabits.length === 0 || dailyCompleted === dailyHabits.length;
        const brokenBadHabit = failedBadCount > 0;

        if (!dailyAllDone || brokenBadHabit) {
          streak = 0;
          alert('😢 어제 루틴을 완수하지 못했거나 금지 약속을 깨뜨려 스트릭이 리셋되었습니다.');
        }

        habits = habits.map(habit => {
          if (habit.type === 'daily') return { ...habit, completed: false };
          if (habit.type === 'badhabit') return { ...habit, failed: false }; 
          return habit;
        });
        
        isStreakBonusGiven = false;
        localStorage.setItem('habits', JSON.stringify(habits));
        localStorage.setItem('streak', streak.toString());
        localStorage.setItem('isStreakBonusGiven', JSON.stringify(isStreakBonusGiven));
        localStorage.setItem('historyData', JSON.stringify(historyData));
        localStorage.setItem('monthlyStats', JSON.stringify(monthlyStats));
      }
      lastSavedDate = todayStr;
      localStorage.setItem('lastSavedDate', lastSavedDate);
    }

    function saveToLocalStorage() {
      localStorage.setItem('habits', JSON.stringify(habits));
      localStorage.setItem('streak', streak.toString());
      localStorage.setItem('isStreakBonusGiven', JSON.stringify(isStreakBonusGiven));
      localStorage.setItem('level', level.toString());
      localStorage.setItem('exp', exp.toString());
    }

    function updateLevel(expGained) {
      exp += expGained;
      if (exp >= 100) {
        level += Math.floor(exp / 100); exp = exp % 100;
        alert(`🎉 레벨 업! 현재 레벨: ${level}`);
      } else if (exp < 0) {
        if (level > 1) { level -= 1; exp = 100 + exp; } else { exp = 0; }
      }
      levelDisplay.innerText = level; expDisplay.innerText = exp;
    }

    function renderStatsReport() {
      if (modalOverlay.style.display !== 'flex') return;

      weeklyRoutineChart.innerHTML = '';
      weeklyFailChart.innerHTML = '';

      const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];
      const today = new Date();

      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(today.getDate() - i);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const dayLabel = daysOfWeek[d.getDay()];

        let routineScore = 0;
        let failCount = 0;

        if (dateStr === getTodayString()) {
          const dailyHabits = habits.filter(h => h.type === 'daily');
          const dailyCompleted = dailyHabits.filter(h => h.completed).length;
          routineScore = dailyHabits.length === 0 ? 0 : Math.round((dailyCompleted / dailyHabits.length) * 100);
          failCount = habits.filter(h => h.type === 'badhabit' && h.failed).length;
        } else if (historyData[dateStr]) {
          routineScore = historyData[dateStr].routineScore || 0;
          failCount = historyData[dateStr].failCount || 0;
        }

        const rRow = document.createElement('div');
        rRow.className = 'chart-row';
        rRow.innerHTML = `
          <span class="chart-day">${dateStr.substring(5)} (${dayLabel})</span>
          <div class="chart-bar-bg"><div class="chart-bar-fill" style="width: ${routineScore}%;"></div></div>
          <span class="chart-value">${routineScore}%</span>
        `;
        weeklyRoutineChart.appendChild(rRow);

        const fRow = document.createElement('div');
        fRow.className = 'chart-row';
        const failBarWidth = Math.min(100, (failCount / 5) * 100); 
        fRow.innerHTML = `
          <span class="chart-day">${dateStr.substring(5)} (${dayLabel})</span>
          <div class="chart-bar-bg"><div class="chart-bar-fill" style="width: ${failBarWidth}%; background-color: #ef5350;"></div></div>
          <span class="chart-value fail">${failCount}회</span>
        `;
        weeklyFailChart.appendChild(fRow);
      }

      monthSuccessDisplay.innerText = monthlyStats.success;
      monthFailDisplay.innerText = monthlyStats.fail;
    }

    function updateProgress() {
      streakCountDisplay.innerText = streak;
      levelDisplay.innerText = level;
      expDisplay.innerText = exp;

      const dailyHabits = habits.filter(h => h.type === 'daily');

      if (dailyHabits.length === 0) {
        progressBar.style.width = '0%'; progressText.innerText = '0%'; 
        renderStatsReport(); return;
      }

      const completedCount = dailyHabits.filter(h => h.completed).length;
      const percentage = Math.round((completedCount / dailyHabits.length) * 100);

      progressBar.style.width = `${percentage}%`;
      progressText.innerText = `${percentage}%`;

      const hasFailedBad = habits.filter(h => h.type === 'badhabit').some(h => h.failed);

      if (percentage === 100 && !hasFailedBad && !isStreakBonusGiven) {
        streak += 1; isStreakBonusGiven = true;
        streakCountDisplay.innerText = streak;
        updateLevel(20);
        alert('축하합니다! 오늘 하루 루틴을 완벽하게 완수했습니다! 🔥 (+20 EXP)');
      } 
      else if ((percentage < 100 || hasFailedBad) && isStreakBonusGiven) {
        streak = Math.max(0, streak - 1); isStreakBonusGiven = false;
        streakCountDisplay.innerText = streak;
        updateLevel(-20);
      }

      saveToLocalStorage();
      renderStatsReport(); 
    }

    // 🔄 유형별 분류 및 렌더링 시스템 개편
    function renderHabits() {
      habitList.innerHTML = '';

      // 오리지널 배열 인덱스를 유지하기 위해 데이터 구조 매핑
      const mappedHabits = habits.map((habit, originalIndex) => ({ ...habit, originalIndex }));

      // 유형별 분리
      const dailyGroup = mappedHabits.filter(h => h.type === 'daily');
      const longtermGroup = mappedHabits.filter(h => h.type === 'longterm');
      const badhabitGroup = mappedHabits.filter(h => h.type === 'badhabit');

      // 묶어서 순서대로 렌더링하는 헬퍼 함수
      function appendGroup(group, title) {
        if (group.length === 0) return;

        // 그룹명 라벨 헤더 추가
        const header = document.createElement('div');
        header.className = 'group-header';
        header.innerText = title;
        habitList.appendChild(header);

        group.forEach(item => {
          const li = document.createElement('li');
          li.className = 'habit-item';
          
          let typeTag = '';
          let actionHtml = '';
          let itemTextClass = 'habit-text';
          let metaHtml = '';

          if (item.type === 'daily') {
            typeTag = '<span class="habit-tag tag-daily">일일 루틴</span>';
            actionHtml = `<input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleDailyHabit(${item.originalIndex})">`;
            if (item.completed) itemTextClass += ' completed';
          } 
          else if (item.type === 'longterm') {
            typeTag = '<span class="habit-tag tag-long">장기 목표</span>';
            actionHtml = `<input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleLongHabit(${item.originalIndex})">`;
            if (item.completed) itemTextClass += ' completed';
            if (item.deadline) {
              metaHtml = `<div class="meta-info-text">${getDDayString(item.deadline)} (목표일: ${item.deadline})</div>`;
            }
          } 
          else if (item.type === 'badhabit') {
            typeTag = '<span class="habit-tag tag-bad">금지 목표</span>';
            const isFailed = item.failed || false;
            const btnText = isFailed ? '💥 실패함' : '⚠️ 실패 기록';
            const btnClass = isFailed ? 'fail-trigger-btn failed' : 'fail-trigger-btn';
            
            actionHtml = `<button class="${btnClass}" onclick="triggerFail(${item.originalIndex})">${btnText}</button>`;
            if (isFailed) {
              li.className += ' failed-status';
              itemTextClass += ' failed-text';
            }

            const ddayStr = item.deadline ? getDDayString(item.deadline) : '🔄 매일 반복';
            const totalFail = item.totalFailures || 0;
            metaHtml = `
              <div class="meta-info-text">
                <span>${ddayStr}</span>
                <span class="total-fail-count">누적 실패: ${totalFail}회</span>
              </div>
            `;
          }

          li.innerHTML = `
            <div class="habit-content">
              ${actionHtml}
              <div class="habit-details">
                <div class="tag-container">${typeTag}</div>
                <span class="${itemTextClass}">${item.text}</span>
                ${metaHtml}
              </div>
            </div>
            <button class="delete-btn" onclick="deleteHabit(${item.originalIndex})">삭제</button>
          `;
          habitList.appendChild(li);
        });
      }

      // 그룹 정렬 순서 강제 정의
      appendGroup(dailyGroup, '🔄 오늘의 일일 루틴 목록');
      appendGroup(longtermGroup, '📅 진행 중인 장기 프로젝트');
      appendGroup(badhabitGroup, '❌ 유혹을 이겨낼 금지형 약속');

      updateProgress();
    }

    function addHabit() {
      const text = habitInput.value.trim();
      if (text === '') return;
      
      const type = habitType.value;
      const deadline = habitDeadline.value;
      const newHabit = { text: text, type: type };
      
      if (type === 'daily' || type === 'longterm') newHabit.completed = false;
      if (type === 'longterm' || type === 'badhabit') { if (deadline) newHabit.deadline = deadline; }
      if (type === 'badhabit') { newHabit.failed = false; newHabit.totalFailures = 0; }

      habits.push(newHabit);
      
      if (type === 'daily' && isStreakBonusGiven) {
        streak = Math.max(0, streak - 1); isStreakBonusGiven = false; updateLevel(-20);
      }

      habitInput.value = '';
      habitDeadline.value = '';
      renderHabits();
    }

    window.toggleDailyHabit = function(index) {
      const wasCompleted = habits[index].completed;
      habits[index].completed = !wasCompleted;
      if (!wasCompleted) updateLevel(10); else updateLevel(-10);
      renderHabits();
    };

    window.toggleLongHabit = function(index) {
      const wasCompleted = habits[index].completed;
      habits[index].completed = !wasCompleted;
      if (!wasCompleted) updateLevel(30); else updateLevel(-30);
      renderHabits();
    };

    window.triggerFail = function(index) {
      const wasFailed = habits[index].failed || false;
      habits[index].failed = !wasFailed;
      
      if (!wasFailed) {
        habits[index].totalFailures = (habits[index].totalFailures || 0) + 1;
        updateLevel(-15);
        alert('앗, 규칙을 어기셨네요! 내일은 꼭 이겨내 봅시다! ✊');
      } else {
        habits[index].totalFailures = Math.max(0, (habits[index].totalFailures || 0) - 1);
        updateLevel(15);
      }
      renderHabits();
    };

    window.deleteHabit = function(index) {
      if (habits[index].type === 'daily' && habits[index].completed) updateLevel(-10);
      if (habits[index].type === 'longterm' && habits[index].completed) updateLevel(-30);
      if (habits[index].type === 'badhabit' && habits[index].failed) updateLevel(15);
      
      habits.splice(index, 1);
      renderHabits();
    };

    addBtn.addEventListener('click', addHabit);
    habitInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addHabit(); });

    initDateDisplay();
    checkDateReset();
    renderHabits();
  </script>
</body>
